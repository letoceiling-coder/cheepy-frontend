## Private whitelist proxy — only parser VPS + localhost
## tinyproxy 1.11: with any Allow rule, non-matching clients are denied (see stock tinyproxy.conf comments).

User tinyproxy
Group tinyproxy

Port 3128
Listen 0.0.0.0

Timeout 600

LogFile "/var/log/tinyproxy/tinyproxy.log"
PidFile "/run/tinyproxy/tinyproxy.pid"
LogLevel Info

MaxClients 100

# ТОЛЬКО РАЗРЕШЁННЫЕ IP (остальные — deny по умолчанию в tinyproxy)
Allow 127.0.0.1
Allow 85.117.235.93

DisableViaHeader Yes

ConnectPort 443
ConnectPort 80

StatFile "/usr/share/tinyproxy/stats.html"
DefaultErrorFile "/usr/share/tinyproxy/default.html"
