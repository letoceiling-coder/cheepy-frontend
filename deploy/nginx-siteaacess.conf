# siteaacess.store — основной сайт (SPA)
# ВАЖНО: root должен быть .../dist — сборка пишется в dist/, не в корень репо
server {
    listen 80;
    listen [::]:80;
    server_name siteaacess.store www.siteaacess.store;
    root /var/www/siteaacess.store/dist;
    index index.html;
    # Не кэшировать HTML-оболочку SPA (в т.ч. fallback с /crm/... → index.html)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# api.siteaacess.store — бекенд API
server {
    listen 80;
    listen [::]:80;
    server_name api.siteaacess.store;
    root /var/www/api.siteaacess.store;
    index index.html;
    # Позже: proxy_pass на Node/PHP приложение
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /api/ {
        # Заглушка; заменить на proxy_pass когда бекенд будет готов
        add_header Content-Type application/json;
        return 200 '{"status":"ok","message":"API placeholder"}';
    }
}

# photos.siteaacess.store — поддомен для фото
server {
    listen 80;
    listen [::]:80;
    server_name photos.siteaacess.store;
    root /var/www/photos.siteaacess.store;
    location / {
        autoindex off;
        add_header Cache-Control "public, max-age=31536000";
    }
    location ~* \.(jpg|jpeg|png|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
